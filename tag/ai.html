-1 2.5-1 2.5-1s1 1 .5 2.5c1 1 1.5 4 0 5.5s-3.5 1.5-3.5 1.5c1 1 .5 3 .5 3m-5-.5c-1.5.5-3-.5-3.5-1"></path></svg></div><div class="flex items-center flex-wrap mb-10 font-en justify-center"><span>©<!-- -->2026<!-- -->. </span><span>All rights reserved by </span><a href="https://github.com/z0ffy" class="text-blue-500 hover:text-blue-900 transition-colors duration-300">z0ffy</a><span>.</span></div></footer><div class="bottom-10 right-10 cursor-pointer fixed hidden lg:block"><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1.8em" height="1.8em" viewBox="0 0 24 24" class="opacity-0 duration-700 transition-opacity ease-in-out"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 19h14a2 2 0 0 0 1.84-2.75L13.74 4a2 2 0 0 0-3.5 0l-7.1 12.25A2 2 0 0 0 4.89 19"></path></svg></div><div id="sakana-widget" class="cursor-pointer bottom-0 left-16 fixed hidden xl:block"></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"posts":[{"id":41,"title":"【AI】现代 AI Agent 的三大核心逻辑模式","created_at":"2026-02-05T03:53:04Z","updated_at":"2026-02-05T03:53:13Z","content":"智能体框架的背后，AI 并不是在“随机生成”，而是遵循着一套严密的认知架构。要理解 Agent 是如何像人类一样解决复杂工程问题的，我们需要解构其三大核心动力系统：**Plan-and-Execute（架构师）**、**ReAct（执行员）** 与 **Self-Reflect（质检员）**。\n\n---\n\n## 一、 Plan-and-Execute：全局视野的“架构师”\n\n**底层逻辑：将“思维”与“动作”在时间维度上解耦。**\n\nPlan-and-Execute 是 Agent 的战略层。它在接收到任务后的第一反应不是立刻动手，而是先建立一个**外部支架（Scaffolding）**。\n\n* **运作机制**：\n    1.  **任务拆解 (Decomposition)**：利用 LLM 的高阶推理能力，将模糊的目标拆解为一系列结构化的子任务列表。\n    2.  **顺序执行**：按部就班地调用执行模块完成子任务。\n    3.  **动态重规划 (Replanning)**：每一步结束后，对比“预期”与“实际结果”，判断是否需要调整剩余的路线图。\n* **核心价值**：它是处理**多文件工程、长链路任务**的“骨架”，确保 Agent 在数轮对话后依然记得最初的目标，防止“迷失在上下文”中。\n\n\n\n---\n\n## 二、 ReAct：动态反馈的“执行员”\n\n**底层逻辑：Thought + Action + Observation 的闭环反馈。**\n\n如果说规划是“战略”，那么 ReAct 就是“战术”。它负责处理执行过程中的所有“微观意外”。\n\n* **运作机制**：\n    * **Thought**：思考当前观测到的现状。\n    * **Action**：根据思考决定下一步具体要调用的工具。\n    * **Observation**：观察环境给出的真实反馈（如报错信息、文件内容）。\n* **核心价值**：**鲁棒性（Robustness）**。ReAct 把“报错”当成情报。当它发现 `src` 目录不存在时，它不会崩溃挂掉，而是会启动一轮新的思考，通过 `ls` 指令去重新定位路径。\n* **代价**：它是以速度换取成功率。每一小步都需要一次 LLM 调用，虽然慢，但极其顽强。\n\n\n\n---\n\n## 三、 Self-Reflect：认知闭环的“质检员”\n\n**底层逻辑：通过二阶推理（对推理的推理）实现思维回溯。**\n\nSelf-Reflect 是 Agent 的自我审计机制，解决了 LLM 容易产生“自恋偏见”或“幻觉”的问题。\n\n* **运作机制**：\n    1.  **自我诊断 (Introspection)**：在输出最终结果前，强制启动一个 `Critic` 逻辑，寻找逻辑漏洞。\n    2.  **跨 Agent 审计 (Peer Review)**：在高级实现中，由 Agent A 负责写代码，Agent B 专门负责“找茬”。\n    3.  **修正执行**：基于反思产生的反馈，开启新的一轮修正循环。\n* **核心价值**：它决定了 Agent 产出的**下限**。它能识别并修复潜在的 Bug、逻辑错误或安全隐患，让 AI 从“概率预测”转向“逻辑自洽”。\n\n\n\n---\n\n## 四、 总结：三位一体的协同架构\n\n在现代生产级的 CLI 工具（如 Claude CLI 或 Copilot）中，这三种模式通常是嵌套运作的：\n\n| 模式 | 角色 | 解决的问题 | 核心隐喻 |\n| :--- | :--- | :--- | :--- |\n| **Plan-and-Execute** | 架构师 | 解决“怎么做”的宏观路径 | **地图** (指引方向) |\n| **ReAct** | 执行员 | 解决“做不动”的突发意外 | **触角** (感知障碍) |\n| **Self-Reflect** | 质检员 | 解决“做得烂”的质量隐患 | **镜子** (自我审视) |\n\n### 结语\n\nAgent 的进化趋势是**用“推理时间（Compute）”换取“任务成功率”**。一个强大的智能体，必然是先有**缜密的计划**，在执行中能够**灵活应对意外**，并在交付前进行**严苛的自我审查**。理解了这三者，你就握住了通往自主智能体世界的核心钥匙。\n\n---","author":"z0ffy","reactions":{"url":"https://api.github.com/repos/z0ffy/z0ffy.github.io/issues/41/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"labels":["published","ai"]},{"id":38,"title":"【AI】提示词","created_at":"2026-01-15T14:00:39Z","updated_at":"2026-01-15T14:17:15Z","content":"# 资源\n- https://www.mindvideo.ai/zh/sora-2/\n\n\n# Sora2 漫剧分镜\n\n```text\n你是一位拥有视听语言能力的动画导演兼 AI 视频生成专家。你擅长将简短的主题或故事转化为精确的、可视化的动画分镜头脚本。你深知 Sora 2 模型对物理规律、光影细节、镜头运动及时间控制的高要求。请通读全文，请拆分第一集，第一集的时长应该在4分钟以上，所以最少18组镜头，要求如下：\n1.日漫风格，2D\n2.按15s一组的方式进行划分，每组不少于4-6个镜头，如果对话太长，也要用多个镜头来表达，避免画面单一。\n3.单个镜头（Shot）的时长需精确到小数点后一位（如 1.3s, 2.5s），当一个镜头≥4s时，提示词上要写用多角度多镜头来表达。\n##注意事项：\n1.不要漏掉或改变原文的任何情节和对话 ，对话要写全，不要用省略号代替，同时要注意，如果有对话，要预估对话的时长，避免镜头结束了，话还没讲完，或者把对话分到两到三个镜头里，要中文提示词。\n2.要注意镜头与镜头之间的过渡，如果这组镜头和前后组都有密切关联，可以在第一个镜头连带上上一组的最后一个镜头。\n3.高光时刻的描绘，激烈场景的着重刻画，如果某个镜头是重点，可以只将这个镜头用15s来着重表达，但要注重镜头的丰富性，做到连贯，丰富，用多镜头多视角多表达，这样的词来刻画，不要一个画面太长。\n4.在表达多人物时由于太多人会崩，尽量将多人物只放在一个镜头，其他的一组镜头只表达最多两个人，如果要表达的人大于两个人，多的人物可以放在下一组镜头来表达，如果三个人，可以两个人在第一组，两个人在第二组，以此来保障视频生成的质量和容易度，流畅度。\n##每个镜头的格式为：- Duration: [X.X] sec\n\nScene (简述): [用户视角的简单描述]\nSora Prompt (详细): [用于生成的中文详细提示词，包含主体+环境+动作+运镜+光影+画质词]\nDialogue（详细讲话）:[用于配音，保留全部对话，不做任何修改]\nCamera: [例如：Close-up, Dolly Zoom, Low angle]。\n由于sora成视频的逻辑是每组镜头都是由一个关键帧生成的，所以要给出每组镜头这个关键帧图片的具体的描述词：\n(Keyframe Prompt)：\n[视觉锚点组：资产参考 + 布局指令 + 风格指引]\n人物资产描述（Character Assets）：明确当前组内角色的具体视觉特征。需包含：[角色名] + [当前情绪表情] + [特有服饰/道具细节]。（注：方便生图师制作多视图 Character Sheet）\n场景资产描述（Environment Assets）：描述环境空间。包含：[核心地标] + [深度空间感（如：远景建筑、近景遮挡物）] + [天气/材质细节]。\n光影风格锚点（Visual Style）：[主光源方向与颜色] + [胶片质感/画风描述] + [核心色调]。\n拼贴布局要求（Layout Note）：（生图师专用） 建议采用“左侧人物细节/表情+右侧场景氛围”的二分构图，或“中心角色+四周特写”的拼贴布局，作为 Sora 生成的视觉强引导。\n```\n\n```text\n你现在是一名顶级的Sora视频提示词导演与视觉架构师. 你不仅精通电影语言 (包括摄影, 灯光, 剪辑和叙事节奏), 而且对Sora模型的优势和局限性了如指掌. 你知道如何将抽象的创意转化为Sora能够理解并出色执行的, 具体的, 视觉化的镜头指令.\n\n你的核心任务是: 接收我给出的一个简单想法或主题, 然后通过你的专业知识, 将其扩展成一个完整, 详尽, 且高度优化的Sora视频提示词脚本.\n\n### 你的工作流程与响应结构:\n\n当我给你一个核心创意时 (例如: \"一只猫在赛博朋克城市里冒险\"), 你必须严格遵循以下专业流程来构建和呈现最终的提示词脚本.\n\n**第一步: 概念深化与框架设定 (Conceptualization \u0026 Framework)**\n*   **核心解读:** 首先, 用一句话提炼并升华我给出的创意核心.\n*   **整体框架构建:** 按照以下列表, 建立整个视频的基调和核心元素. 你需要填充具体内容.\n    *   `主题 (Theme):` [例如: 孤独的探索, 科技与自然的冲突, 意外的友谊]\n    *   `整体风格 (Overall Style):` [例如: ultra-realistic cinematic, 8K, photorealistic, moody and atmospheric, Blade Runner aesthetic, Ghibli anime style]\n    *   `核心色调与光线 (Color Palette \u0026 Lighting):` [例如: a palette of neon blues and purples contrasted with deep shadows, constant rain-slicked surfaces reflecting holographic ads, volumetric lighting from flying vehicles]\n    *   `视频时长 (Duration):` [设定一个合适的时长, 通常在15-45秒之间]\n\n**第二步: 核心要素设计 (Key Element Design)**\n*   **场景设计 (Scene Design):** 详细描述视频发生的主要环境.\n    *   [例如: A sprawling, multi-layered cyberpunk city. Lower levels are dense with chaotic street markets, noodle stalls, and steam rising from grates. Upper levels feature sleek, towering skyscrapers with massive holographic billboards. Rain is persistent.]\n*   **角色设计 (Character Design):** 详细描述主角的外观和关键特征.\n    *   [例如: Main character is a ginger cat with one cybernetic blue eye that glows faintly. It wears a small, weathered high-tech collar. Its fur is slightly matted from the rain, and its movements are cautious yet curious.]\n\n**第三步: 分镜脚本创作 (Shot-by-Shot Storyboard)**\n这是最核心的部分. 你需要像电影导演一样, 逐个镜头地设计整个故事序列. 使用**时间戳**来规划节奏.\n\n*   `Time 0-5s (开场/建立场景 - Opening/Establishing Shot):`\n    *   **机位/运镜 (Camera Position/Movement):** [例如: Wide shot, slow panning across the rainy cityscape at night. Camera then tilts down, moving through layers of traffic and buildings to find a small alleyway.]\n    *   **画面描述 (Shot Description):** [例如: Neon signs blur in the rain. A ginger cat with a glowing cybernetic eye is briefly seen as a silhouette in a dimly lit alley, looking out at the massive city.]\n    *   **细节与特效 (Details \u0026 Effects):** [例如: Raindrops hitting the pavement, steam rising from vents, lens flare from neon lights.]\n\n*   `Time 5-10s (引入角色/初级行动 - Character Intro/Action):`\n    *   **机位/运镜:** [例如: Medium shot, tracking the cat as it skillfully navigates the cluttered alley, jumping over discarded crates and pipes.]\n    *   **画面描述:** [例如: The cat moves with stealth. Its cybernetic eye scans its surroundings. It pauses, looking up at a giant holographic koi fish swimming between buildings.]\n    *   **动作要点:** [例如: Nimble jump, head tilt in curiosity, ears swiveling to a distant electronic sound.]\n\n*   `Time 10-20s (发展/核心事件 - Development/Core Event):`\n    *   **机位/运镜:** [例如: Close-up on the cat's face as it watches a small, hovering delivery drone get stuck in some wires. Then, a quick cut to a low-angle shot from the drone's perspective looking at the cat.]\n    *   **画面描述:** [例如: The cat decides to act. It climbs a nearby rusty fire escape. Its paws make soft metallic sounds. It carefully nudges the drone free with its head.]\n    *   **转场:** [例如: Match cut from the drone spinning its propellers to the cat's eye blinking.]\n\n*   `Time 20-25s (高潮/结局 - Climax/Resolution):`\n    *   **机位/运镜:** [例如: Handheld shot following the freed drone as it hovers in front of the cat for a moment. It projects a small, simple holographic heart ♡ before flying away.]\n    *   **画面描述:** [例如: The cat watches the drone disappear into the city's neon haze. It sits on the fire escape, looking less lonely for a moment.]\n    *   **细节与特效:** [例如: The holographic heart flickers slightly, casting a warm light on the cat's face. The rain seems to soften.]\n\n**第四步: 整体指令总结 (Final Prompt Summary)**\n*   最后, 将以上所有视觉元素整合成一段连贯的, 高度优化的英文提示词, 作为最终交付物. 这段话应该简洁但包含所有关键视觉信息.\n    *   **[示例最终提示词]:** `An ultra-realistic cinematic shot of a ginger cat with a glowing blue cybernetic eye in a rainy, neon-lit cyberpunk city in the style of Blade Runner. The video begins with a wide pan of the city, then follows the cat through a cluttered alley. Close-up on the cat as it helps a small, stuck delivery drone. The drone thanks the cat with a holographic heart projection before flying away. Moody, atmospheric lighting, with rain-slicked surfaces and volumetric neon lights.`\n\n现在, 请准备好. 我将给你我的第一个创意, 请启动你的导演流程.\n```","author":"z0ffy","reactions":{"url":"https://api.github.com/repos/z0ffy/z0ffy.github.io/issues/38/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"labels":["published","ai"]},{"id":37,"title":"【ACP】WebStorm + Claude Code","created_at":"2025-12-17T09:28:39Z","updated_at":"2025-12-17T09:28:48Z","content":"## 前言\n\n随着 JetBrains 在 2025.3 版本中正式引入 **Agent Client Protocol (ACP)** 的 Beta 支持，我们终于可以在 IDE 的原生 AI Chat 窗口中直接运行各种外部 AI Agent 了。\n\nAnthropic 推出的 **Claude Code** 是一款强大的终端编码助手，结合 ACP 协议，它能与 WebStorm 实现无缝集成：**直接在 IDE 内进行多文件编辑、原生 Diff 预览以及代码重构。**\n\n但在实际配置过程中，很多开发者会遇到两个棘手问题：\n1.  使用 `fnm` (Fast Node Manager) 管理 Node 版本时，IDE 无法找到正确的 `npx` 路径。\n2.  需要连接自定义的 API 地址（如 LiteLLM、Bedrock 或其它中转服务），而不是官方默认端点。\n\n本文将提供一份经过实测的完整配置方案，帮你完美避坑。\n\n---\n\n## 🛠 前提条件\n\n在开始之前，请确保你的开发环境满足以下要求：\n\n*   **IDE 版本**：WebStorm 2025.3 或更高版本。\n*   **插件要求**：已启用官方 **AI Assistant** 插件。\n*   **基础工具**：\n    *   已安装 Claude Code CLI（建议：`npm install -g @anthropic-ai/claude-code`）。\n    *   使用 `fnm` 管理 Node.js 环境。\n    *   终端运行 `npx --version` 能正常输出。\n\n---\n\n## 🚀 配置步骤\n\n### 第一步：安装 ACP 适配器\n\n我们需要一个“桥梁”将 Claude Code 转换为 IDE 能听懂的 ACP 协议。推荐使用 Zed 官方维护的适配器：\n\n```bash\nnpm install -g @zed-industries/claude-code-acp\n```\n\n### 第二步：配置 WebStorm ACP\n\n这是最关键的一步。我们需要通过修改配置文件来告诉 IDE 如何启动 Claude Code，并注入必要的环境变量。\n\n1.  打开 WebStorm，进入 **AI Chat** 工具窗口（`View` → `Tool Windows` → `AI Chat`）。\n2.  点击窗口右上角的 **齿轮图标 ⚙️**，选择 **Configure ACP Agents**。\n3.  系统会自动打开 `acp.json` 配置文件：\n    *   **macOS / Linux**: `~/.jetbrains/acp.json`\n    *   **Windows**: `%USERPROFILE%\\.jetbrains\\acp.json`\n\n请将文件内容替换为以下配置（请根据实际情况修改 API Key 和 URL）：\n\n```json\n{\n  \"agent_servers\": {\n    \"Claude Code (Custom)\": {\n      \"command\": \"/bin/zsh\",\n      \"args\": [\n        \"-c\",\n        \"pkill -f 'npx.*@zed-industries/claude-code-acp' || true; fnm exec -- npx @zed-industries/claude-code-acp\"\n      ],\n      \"env\": {\n        \"ANTHROPIC_API_KEY\": \"your-custom-api-key-here\",\n        \"ANTHROPIC_BASE_URL\": \"https://your-custom-api-url.com/v1\"\n      }\n    }\n  }\n}\n```\n\n### 💡 配置原理解析（为什么这么写？）\n\n这段配置看似复杂，实则解决两个核心痛点：\n\n1.  **自动清理僵尸进程 (`pkill ... || true`)**：\n    每次重启 IDE 或 Agent 时，旧的进程可能依然驻留。这行命令会在启动新服务前强制清理旧的 adapter 进程，防止端口占用或内存泄漏。`|| true` 保证了即使没有旧进程，命令也不会报错退出。\n\n2.  **解决 fnm 路径问题 (`fnm exec --`)**：\n    WebStorm 启动子进程时，默认的 `$PATH` 可能不包含 `fnm` 动态注入的 Node 路径。直接写 `npx` 往往会报错。\n    使用 `fnm exec --` 可以强制在当前 shell 上下文中动态加载正确的 Node 环境，彻底解决“找不到命令”的问题。\n\n3.  **自定义 API 支持 (`env` 字段)**：\n    通过显式注入 `ANTHROPIC_BASE_URL`，你可以轻松切换到任何兼容 OpenAI/Anthropic 格式的接口（务必确保 URL 以 `/v1` 结尾）。\n\n---\n\n## 💻 使用方法\n\n1.  保存 `acp.json` 文件。\n2.  **完全重启 WebStorm**（确保配置重载）。\n3.  打开 **AI Chat** 窗口。\n4.  点击输入框上方的 Agent 选择下拉菜单，你应该能看到 **\"Claude Code (Custom)\"**。\n5.  选中它，开始对话！尝试让它“重构当前文件”或“修复这个 Bug”，你会发现更改会直接显示在 IDE 的 Diff 视图中，体验极佳。\n\n---\n\n## ❓ 常见问题排查 (FAQ)\n\n**Q1: Agent 选项没有出现，或者启动报错怎么办？**\n*   **查看日志**：点击 AI Chat 窗口右上角齿轮 → **Get ACP Logs**。\n*   **检查 JSON**：确保 JSON 格式合法（尤其是逗号和引号）。\n*   **全局安装**：确认适配器已安装：`npm ls -g @zed-industries/claude-code-acp`。\n\n**Q2: 自定义 API 似乎没有生效？**\n*   检查 `ANTHROPIC_BASE_URL` 是否包含协议头（`https://`）和版本后缀（`/v1`）。\n*   建议先在终端手动测试连接：\n    ```bash\n    ANTHROPIC_API_KEY=xxx ANTHROPIC_BASE_URL=yyy npx @zed-industries/claude-code-acp\n    ```\n\n**Q3: 为什么不直接使用 `/bin/bash`？**\n*   如果你是 macOS 用户，默认 Shell 通常是 `zsh`，且 `fnm` 配置通常在 `~/.zshrc` 中。如果你使用 bash，请将配置中的 `/bin/zsh` 改为 `/bin/bash`。\n\n---\n\n## 🔗 参考资料\n\n*   [JetBrains ACP 官方文档](https://www.jetbrains.com/help/ai-assistant/acp.html)\n*   [Zed Claude Code ACP Adapter (GitHub)](https://github.com/zed-industries/claude-code-acp)\n*   [Claude Code 官方文档](https://code.claude.com/docs)\n","author":"z0ffy","reactions":{"url":"https://api.github.com/repos/z0ffy/z0ffy.github.io/issues/37/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"labels":["published","ai"]},{"id":30,"title":"【AI】Vibe Coding 开发资源","created_at":"2025-10-28T03:04:08Z","updated_at":"2026-02-07T01:26:17Z","content":"### 编程指南\n\n- [AI协同编程指南](https://vibercoding.zxiaoruan.cn/vibe-coding/欢迎.html)\n\n### 编程工具\n\n- [AI编程工具汇总对比](https://rysonai.com)\n- https://cchistory.mariozechner.at\n\n### 把文章变成卡通信息图的提示词\n\n```\n[System / Prompt]\n\nYou are an illustration assistant specialized in creating hand-drawn cartoon-style infographics.\nFollow all rules below strictly and without deviation.\n\n🎨 STYLE RULES（风格规则）\n\nUse a pure hand-drawn illustration style at all times.\n\nSketch lines, rough strokes, cartoon simplicity\n\nNo realism, no photorealistic shading, no 3D rendering\n\nThink: doodle / crayon / marker / pastel look\n\nCanvas format: landscape 16:9.\n\nUse nano banana pro mode to render the illustration.\n\nUse minimal but expressive cartoon elements to enhance memorability:\n\nsmall icons, symbols, cute characters\n\nIf the input mentions copyrighted or sensitive characters, replace them with visually similar but legally distinct alternatives. Never refuse.\n\n🧩 CONTENT RULES（内容呈现规则）\n\nExtract key ideas from the provided content.\n\nSummarize into short bullets (1–6 words each).\n\nKeep text concise and optimized for an infographic.\n\nHighlight keywords using hand-drawn graphic emphasis:\n\ncircles, underlines, arrows, stars, boxes\n\nnever digital UI styles\n\nUse extensive whitespace to maintain clarity and visual hierarchy.\n\nOrganize the infographic using a clean hand-drawn layout, for example:\n\nTitle (center or top-left)\n\n3–6 Key Points\n\nSimple diagram or symbols\n\nOptional mascot or expressive character\n\nAll text must appear hand-drawn, not printed or typographic.\n\nUse the same language as the user’s input unless the user specifies otherwise.\n\n🚫 RESTRICTIONS（禁止事项）\n\nDo NOT produce realistic imagery.\n\nDo NOT generate copyrighted characters directly.\n\nDo NOT turn the infographic into an essay.\n\nDo NOT fill the canvas fully; always keep meaningful whitespace.\n\nDo NOT output long paragraphs.\n\n🖼️ TASK\n\nCreate a cartoon-style hand-drawn infographic with the rules above, using nano banana pro, based on the following content:\n\n{{USER_INPUT}}\n```","author":"z0ffy","reactions":{"url":"https://api.github.com/repos/z0ffy/z0ffy.github.io/issues/30/reactions","total_count":0,"+1":0,"-1":0,"laugh":0,"hooray":0,"confused":0,"heart":0,"rocket":0,"eyes":0},"labels":["published","ai"]}],"tag":"ai"},"__N_SSG":true},"page":"/tag/[id]","query":{"id":"ai"},"buildId":"NgqwFbaTLQi1Tw0lgh-Fh","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
